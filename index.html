/* ════════════════════════ Import / Export ════════════════════════ */
/* ── One-click file backup ──
   localStorage is the live store (private to this device). These let you keep a
   single backup FILE you own — and, where the browser supports it (Chrome/Edge),
   "Save to file" silently re-writes the SAME file you opened or first chose, so
   backing up is one click. Other browsers fall back to download / file-picker. */
let backupHandle=null;
const fsSupported = 'showSaveFilePicker' in window;
const backupName=()=> backupHandle ? backupHandle.name : null;
const stateJSON=()=> JSON.stringify(state,null,2);
function loadStateText(txt){const s=JSON.parse(txt);if(!s||!s.projects)throw 0;state=s;render();}

async function saveToFile(){
  const data=stateJSON();
  if(fsSupported){
    try{
      if(!backupHandle){
        backupHandle=await window.showSaveFilePicker({
          suggestedName:'script-backup.json',
          types:[{description:'Script backup',accept:{'application/json':['.json']}}]
        });
      }
      const w=await backupHandle.createWritable();await w.write(data);await w.close();
      toast('Saved to '+backupHandle.name);
    }catch(e){if(e.name!=='AbortError')toast('Save canceled');}
  }else{
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download='script-backup.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded');
  }
}
async function openFromFile(){
  if(fsSupported){
    try{
      const [h]=await window.showOpenFilePicker({types:[{description:'Script backup',accept:{'application/json':['.json']}}]});
      backupHandle=h;                                  // remember it so Save overwrites this file
      const txt=await (await h.getFile()).text();
      loadStateText(txt);toast('Opened '+h.name);
    }catch(e){if(e.name!=='AbortError')toast(e.name==='AbortError'?'':'Couldn’t open that file');}
  }else{
    $('#importFile').click();
  }
}
$('#importFile').addEventListener('change',e=>{   // fallback open for browsers without the file API
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{loadStateText(rd.result);toast('Opened backup');}catch(err){toast('Invalid file');}};
  rd.readAsText(f);e.target.value='';
});
// Export the current project as a formatted, Word/Pages/Docs-openable document.
function exportDocument(){
  const p=activeProject();const esc=escapeHTML;
  let body=`<h1>${esc(p.title)}</h1>`;
  if(p.subtitle)body+=`<p class="sub">${esc(p.subtitle)}</p>`;
  body+=`<p class="meta">${p.scenes.length} scene${p.scenes.length!==1?'s':''} · ${fmt(totalDuration(p))} total</p><hr>`;
  p.scenes.forEach((s,i)=>{
    body+=`<h2>${i+1}.&nbsp; ${esc(s.title||'Untitled')} <span class="dur">— ${s.duration}s</span></h2>`;
    body+=`<p class="speaker">${esc(speakerOf(p,s).name.toUpperCase())}</p>`;
    if(s.narration)body+=`<p class="narr">${esc(s.narration)}</p>`;
    if(s.onScreen.length)body+=`<p class="lbl">On-screen</p><ul>${s.onScreen.map(o=>`<li>${esc(o.text)}</li>`).join('')}</ul>`;
    if(s.references.length)body+=`<p class="lbl">References</p><ul>${s.references.map(r=>`<li>${esc(r.title)}${r.url?` — ${esc(r.url)}`:''}</li>`).join('')}</ul>`;
    body+=`<hr>`;
  });
  const doc=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>${esc(p.title)}</title>`
    +`<style>body{font-family:Georgia,'Times New Roman',serif;line-height:1.55;color:#1a1a1a;max-width:680px;margin:48px auto;padding:0 28px}`
    +`h1{font-size:27px;margin:0 0 4px}h2{font-size:17px;margin:26px 0 6px}.sub{color:#666;font-style:italic;margin:0 0 6px}.meta{color:#999;font-size:12px;margin:0}`
    +`.dur{color:#999;font-weight:normal;font-size:14px}.narr{margin:6px 0}.speaker{font-size:11px;letter-spacing:.14em;font-weight:bold;color:#444;margin:8px 0 2px}.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#999;margin:12px 0 2px}`
    +`ul{margin:2px 0 8px 20px;padding:0}li{margin:2px 0}hr{border:none;border-top:1px solid #e0e0e0;margin:20px 0}</style></head><body>${body}</body></html>`;
  const blob=new Blob(['﻿'+doc],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(p.title||'script').toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')+'.doc';
  a.click();URL.revokeObjectURL(a.href);toast('Document exported');
}

/* ════════════════════════ Lock-all → Record mode ════════════════════════ */
function lockAll(){
  activeProject().scenes.forEach(s=>s.locked=true);
  render();enterRecord(activeProject().scenes[0].id);
}
function enterRecord(sceneId){
  const p=activeProject();const idx=Math.max(0,p.scenes.findIndex(s=>s.id===sceneId));
  state.mode='record';state.recordIndex=idx;
  document.documentElement.setAttribute('data-theme','dark');   // record mode is always dark
  recordPlaying=true;recordRemain=p.scenes[idx].duration;        // auto-run: the bar fills and advances
  paintRecord();$('#record').classList.add('show');
}
function exitRecord(){
  recordPlaying=false;clearInterval(recordTimer);
  state.mode='edit';$('#record').classList.remove('show');
  document.documentElement.setAttribute('data-theme',state.theme); // restore the user's theme
}
function paintRecord(){
  const r=$('#record');const p=activeProject();const i=state.recordIndex;const sc=p.scenes[i];
  if(!sc){exitRecord();return;}
  r.innerHTML=`
    <div class="rtop"><span class="rnum">${String(i+1).padStart(2,'0')}</span><span class="rtitle">${escapeHTML(sc.title||'Scene')}</span><span class="rspk" style="color:${speakerOf(p,sc).color}">● ${escapeHTML(speakerOf(p,sc).name)}</span><span class="rspacer"></span><button class="rexit" data-exit>Exit ✕</button></div>
    <div class="rstage"><div class="rnarr">${escapeHTML(sc.narration)||'<span style="color:var(--muted)">— no narration —</span>'}</div></div>
    <div class="rprogress"><div class="rbar" id="rbar"></div></div>
    <div class="rfilm">${p.scenes.map((s,k)=>`<div class="rcell ${k===i?'active':k<i?'past':''}" data-cell="${k}">${k+1}</div>`).join('')}</div>
    <div class="rctrls"><span class="rtime" id="rtime">${fmt(recordPlaying?recordRemain:sc.duration)}</span><button data-prev>${I.prev}</button><button class="play" data-play>${recordPlaying?I.pause:I.play}</button><button data-next>${I.next}</button></div>`;
  r.querySelector('[data-exit]').onclick=exitRecord;
  r.querySelector('[data-prev]').onclick=()=>gotoRecord(i-1);
  r.querySelector('[data-next]').onclick=()=>gotoRecord(i+1);
  r.querySelector('[data-play]').onclick=togglePlay;
  r.querySelectorAll('[data-cell]').forEach(c=>c.onclick=()=>gotoRecord(+c.dataset.cell));
  // entrance: narration slides up
  const narr=r.querySelector('.rnarr');narr.style.opacity=0;narr.style.transform='translateY(24px)';
  requestAnimationFrame(()=>{narr.style.opacity=1;narr.style.transform='none';});
  // scroll film to active
  const ac=r.querySelector('.rcell.active');if(ac)ac.scrollIntoView({inline:'center',block:'nearest'});
  if(recordPlaying)runTimer();
}
function gotoRecord(n){
  const p=activeProject();if(n<0||n>=p.scenes.length){if(n>=p.scenes.length){recordPlaying=false;clearInterval(recordTimer);}return;}
  state.recordIndex=n;recordRemain=p.scenes[n].duration;paintRecord();
}
function togglePlay(){
  recordPlaying=!recordPlaying;
  if(recordPlaying){
    if(recordRemain<=0)recordRemain=activeProject().scenes[state.recordIndex].duration;
    runTimer();
  } else clearInterval(recordTimer);
  paintRecord();
}
function runTimer(){
  clearInterval(recordTimer);
  const dur=activeProject().scenes[state.recordIndex].duration;
  const startRemain=recordRemain;          // seconds left when this run began
  const t0=performance.now();
  const bar=$('#rbar'),tm=$('#rtime');
  // drive from real elapsed time so the bar mirrors the allotted seconds even
  // if the interval is throttled; advancing when the bar fills the column.
  recordTimer=setInterval(()=>{
    recordRemain=startRemain-(performance.now()-t0)/1000;
    if(bar)bar.style.width=clamp((1-recordRemain/dur)*100,0,100)+'%';
    if(tm)tm.textContent=fmt(Math.max(0,Math.ceil(recordRemain)));
    if(recordRemain<=0){
      clearInterval(recordTimer);
      const next=state.recordIndex+1;
      if(next<activeProject().scenes.length){gotoRecord(next);}
      else{recordPlaying=false;paintRecord();toast('End of script');}
    }
  },80);
}

/* ════════════════════════ Scrim / overlay manager ════════════════════════ */
let scrimClose=null;
function scrim(show,onClose){
  const s=$('#scrim');
  if(show){s.classList.add('show');scrimClose=onClose;}
  else{s.classList.remove('show');scrimClose=null;}
}
$('#scrim').addEventListener('click',()=>{if(scrimClose)scrimClose();});

/* ════════════════════════ Global wiring ════════════════════════ */
const drawerOpen=()=>document.body.classList.contains('drawer-open');
// pencil (top) → project menu popover, anchored top-left
$('#logoBtn').addEventListener('click',e=>{e.stopPropagation();if(drawerOpen())closeDrawer();openMenu('top');});
// rest of the spine / the vertical title → project switcher drawer
$('#spine').addEventListener('click',e=>{if(e.target.closest('#menuBtn')||e.target.closest('#logoBtn'))return;drawerOpen()?closeDrawer():openDrawer();});
// bottom hamburger → app settings (accent, theme, pacing)
$('#menuBtn').addEventListener('click',e=>{e.stopPropagation();openSettings();});

// per-project cover image (the bleed at the far right) — upload / remove
function downscaleImage(file,maxDim,cb){
  const url=URL.createObjectURL(file),img=new Image();
  img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);cb(c.toDataURL('image/jpeg',0.82));};
  img.onerror=()=>{URL.revokeObjectURL(url);toast('Could not read that image');};
  img.src=url;
}
$('#heroUpload').addEventListener('click',()=>$('#heroFile').click());
$('#heroRemove').addEventListener('click',()=>{activeProject().heroImage='';save();render();toast('Cover removed');});
$('#heroFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;downscaleImage(f,1100,d=>{activeProject().heroImage=d;save();render();toast('Cover updated');});e.target.value='';});
// clicking the pushed-aside editor closes the drawer
$('#track-wrap').addEventListener('click',()=>{if(drawerOpen())closeDrawer();});
// hard guard: the track area must never hold a vertical scroll (focus() or
// scrollIntoView could otherwise push the scene numbers off the top with no
// scrollbar to bring them back).
$('#track-wrap').addEventListener('scroll',()=>{if($('#track-wrap').scrollTop)$('#track-wrap').scrollTop=0;});

document.addEventListener('keydown',e=>{
  if(state.mode==='record'){
    if(e.key==='Escape')exitRecord();
    else if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();gotoRecord(state.recordIndex+1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();gotoRecord(state.recordIndex-1);}
    else if(e.key.toLowerCase()==='p'){togglePlay();}
    return;
  }
  if(e.key==='Escape'){if(drawerOpen())closeDrawer();else if(scrimClose)scrimClose();}
});

render();
